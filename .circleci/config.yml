# CircleCI 2.1 — builds & deploys the universal tag (apps/tracker) from the Turborepo.
# The monorepo uses Bun (package manager + workspaces) and Turborepo. Parcel runs under
# Node via apps/tracker/scripts/run-parcel.mjs. node_modules is hoisted (bunfig.toml) so
# Parcel's resolver works. Buckets and all CloudFront distribution IDs are unchanged from
# the pre-monorepo pipeline — only the build commands and the dist path (apps/tracker/dist) changed.

version: 2.1

executors:
  the-executor:
    docker:
      - image: cimg/node:22.11.0
    working_directory: ~/mediajel-tracker

orbs:
  aws-cli: circleci/aws-cli@4.0
  aws-s3: circleci/aws-s3@2.0.0
  aws-cloudfront: topmonks/aws-cloudfront@1.0.0

commands:
  install-bun:
    description: Install Bun (pinned) and put it on PATH for later steps
    steps:
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.8"
            echo 'export PATH="$HOME/.bun/bin:$PATH"' >> "$BASH_ENV"
  install-and-check:
    description: Install dependencies (hoisted) and type-check the tracker + its packages
    steps:
      - run:
          name: Install project dependencies
          command: bun install --frozen-lockfile
      - run:
          name: Type checking (tracker + shared packages)
          command: bunx turbo run check --filter=mediajel-tracker
      - run:
          name: Build tag
          command: bunx turbo run build --filter=mediajel-tracker

jobs:
  build-staging:
    executor: the-executor
    steps:
      - checkout
      - install-bun
      - install-and-check
        #   TODO: UNCOMMENT LATER
      # - run:
      #     name: Cypress Install
      #     command: sudo apt-get update && sudo apt-get install libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      # - run:
      #     name: cypress tests
      #     command: bunx turbo run test --filter=mediajel-tracker
      - aws-cli/install:
          version: latest
      - run:
          name: Sync to S3
          command: |
            aws s3 sync apps/tracker/dist/ s3://mediajel-tracker-staging
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id E1ZEPT1NM5152K --paths "/*"

  build-main:
    executor: the-executor
    steps:
      - checkout
      - install-bun
      - install-and-check
      # - run:
      #     name: Cypress Install
      #     command: sudo apt-get update && sudo apt-get install libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      # - run:
      #     name: cypress tests
      #     command: bunx turbo run test --filter=mediajel-tracker
      - aws-cli/install:
          version: latest
      - run:
          name: Sync to S3
          command: |
            aws s3 sync apps/tracker/dist/ s3://mediajel-tracker-production
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id E3NZWAOF5B6J2O --paths "/*"
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id E3FT67SI37G1ZH --paths "/*"
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id EQGTP3X7S8LMI --paths "/*"
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id EFJHMMZDNURYT --paths "/*"
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id E39XLCEMWS6VO1 --paths "/*"
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id E270PRY60O4B3Y --paths "/*"
      - run:
          name: Invalidate CloudFront
          command: |
            aws cloudfront create-invalidation --distribution-id ELFZ8CP0408WK --paths "/*"
      - run:
          name: Run Tracker
          command: bunx turbo run generate-environments --filter=mediajel-tracker

workflows:
  version: 2
  build:
    jobs:
      - build-staging:
          context: STAGING
          filters:
            branches:
              only: staging
      - build-main:
          context: PRODUCTION
          filters:
            branches:
              only: main
