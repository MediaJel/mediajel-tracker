# Snowplow Micro / Stream Collector overrides.
# The MediaJel tag posts to a custom path (postPath: "/analytics/track"); map it to the
# standard tracker-protocol endpoint so Micro accepts the events. The collector reflects the
# request Origin for CORS automatically, and the training site additionally proxies these
# endpoints same-origin, so no extra CORS config is required.
collector {
  paths {
    "/analytics/track" = "/com.snowplowanalytics.snowplow/tp2"
  }
}
